name: Deploy Production

on:
    push:
        tags:
            - "v*"

permissions:
    contents: read
    packages: write

concurrency:
    group: closy-production
    cancel-in-progress: false

env:
    IMAGE_BASENAME: backend-smartwardrobe

jobs:
    validate:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.release.outputs.version }}
            commit_sha: ${{ steps.release.outputs.commit_sha }}

        steps:
            - name: Checkout tagged source
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Validate production tag
              id: release
              shell: bash
              run: |
                  VERSION="${GITHUB_REF_NAME}"

                  if [[ ! "${VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                    echo "Invalid production tag: ${VERSION}"
                    echo "Expected format: vMAJOR.MINOR.PATCH"
                    exit 1
                  fi

                  git fetch --force origin main
                  COMMIT_SHA="$(git rev-list -n 1 "${VERSION}")"

                  if ! git merge-base --is-ancestor "${COMMIT_SHA}" origin/main; then
                    echo "Tagged commit is not part of the main branch history."
                    exit 1
                  fi

                  echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
                  echo "commit_sha=${COMMIT_SHA}" >> "${GITHUB_OUTPUT}"

    verify:
        needs: validate
        runs-on: ubuntu-latest

        steps:
            - name: Checkout released source
              uses: actions/checkout@v4
              with:
                  ref: ${{ needs.validate.outputs.version }}
                  fetch-depth: 0

            - name: Set up Go 1.25
              uses: actions/setup-go@v5
              with:
                  go-version: "1.25.x"
                  cache: true

            - name: Run project checks
              run: make check

    build:
        needs:
            - validate
            - verify
        runs-on: ubuntu-latest
        outputs:
            image_name: ${{ steps.image.outputs.name }}
            image_digest: ${{ steps.build.outputs.digest }}

        steps:
            - name: Checkout released source
              uses: actions/checkout@v4
              with:
                  ref: ${{ needs.validate.outputs.version }}

            - name: Resolve lowercase image name
              id: image
              shell: bash
              run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${IMAGE_BASENAME}" >> "${GITHUB_OUTPUT}"

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push backend image
              id: build
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./Dockerfile
                  target: production
                  push: true
                  platforms: linux/amd64
                  tags: |
                      ${{ steps.image.outputs.name }}:${{ needs.validate.outputs.version }}
                      ${{ steps.image.outputs.name }}:${{ needs.validate.outputs.commit_sha }}
                      ${{ steps.image.outputs.name }}:latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  provenance: true
                  sbom: true

    deploy:
        needs:
            - validate
            - build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout released deployment files
              uses: actions/checkout@v4
              with:
                  ref: ${{ needs.validate.outputs.version }}

            - name: Prepare SSH
              shell: bash
              run: |
                  install -m 700 -d ~/.ssh
                  printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
                  chmod 600 ~/.ssh/id_ed25519
                  printf '%s\n' "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
                  chmod 600 ~/.ssh/known_hosts

            - name: Create deployment archive
              shell: bash
              run: tar -czf /tmp/closy-deploy.tar.gz docker-compose.prod.yml nginx rabbitmq init-db

            - name: Upload deployment archive
              shell: bash
              run: scp -P "${{ secrets.VPS_SSH_PORT }}" /tmp/closy-deploy.tar.gz "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/closy-deploy.tar.gz"

            - name: Log VPS in to private GHCR
              shell: bash
              run: printf '%s' "${{ secrets.GHCR_READ_TOKEN }}" | ssh -p "${{ secrets.VPS_SSH_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "docker login ghcr.io -u '${{ secrets.GHCR_USERNAME }}' --password-stdin"

            - name: Deploy immutable backend image
              shell: bash
              run: |
                  ssh -p "${{ secrets.VPS_SSH_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
                    set -e
                    mkdir -p /opt/closy
                    tar -xzf /tmp/closy-deploy.tar.gz -C /opt/closy
                    rm -f /tmp/closy-deploy.tar.gz
                    cd /opt/closy
                    if [ -f .env.deploy ]; then cp .env.deploy .env.deploy.previous; fi
                    printf 'BACKEND_IMAGE=%s@%s\n' '${{ needs.build.outputs.image_name }}' '${{ needs.build.outputs.image_digest }}' > .env.deploy
                    chmod 600 .env.deploy
                    docker compose --env-file .env.production --env-file .env.deploy -f docker-compose.prod.yml config >/dev/null
                    docker compose --env-file .env.production --env-file .env.deploy -f docker-compose.prod.yml pull
                    docker compose --env-file .env.production --env-file .env.deploy -f docker-compose.prod.yml up -d --remove-orphans
                    docker compose --env-file .env.production --env-file .env.deploy -f docker-compose.prod.yml ps
                  "

            - name: Verify production health
              shell: bash
              run: curl --fail --silent --show-error --retry 12 --retry-delay 5 "${{ vars.PRODUCTION_HEALTH_URL }}"

            - name: Roll back backend when deployment fails
              if: failure()
              shell: bash
              run: |
                  ssh -p "${{ secrets.VPS_SSH_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
                    cd /opt/closy
                    if [ -f .env.deploy.previous ]; then
                      mv .env.deploy.previous .env.deploy
                      docker compose --env-file .env.production --env-file .env.deploy -f docker-compose.prod.yml pull backend
                      docker compose --env-file .env.production --env-file .env.deploy -f docker-compose.prod.yml up -d --remove-orphans
                    fi
                  "

            - name: Remove unused images
              if: success()
              shell: bash
              run: ssh -p "${{ secrets.VPS_SSH_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "docker image prune -f"

name: CI

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    verify:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout source
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up Go 1.25
              uses: actions/setup-go@v5
              with:
                  go-version: "1.25.x"
                  cache: true

            - name: Verify Go version
              run: go version

            - name: Run project checks
              run: make check

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>SmartWardrobe BE - Swagger UI</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css"
    />
    <style>
      :root {
        color-scheme: light !important;
      }
      .swagger-ui .topbar .download-url-wrapper {
        display: flex;
        gap: 10px;
      }
      .custom-toolbar {
        background-color: #fafafa;
        padding: 10px 20px;
        border-bottom: 1px solid #e8e8e8;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 10px;
        font-family: sans-serif;
      }
      .custom-btn {
        padding: 6px 12px;
        border: 1px solid #ccc;
        background: #fff;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.2s;
      }
      .custom-btn:hover {
        background: #eee;
      }
      .custom-btn.primary {
        background: #49cc90;
        color: #fff;
        border-color: #49cc90;
      }
      .custom-btn.primary:hover {
        background: #3b9c6f;
      }
      @media print {
        .custom-toolbar {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="custom-toolbar">
      <span style="font-size: 14px; color: #555">Tùy chọn hiển thị:</span>
      <button class="custom-btn primary" onclick="expandAll()">
        Mở rộng tất cả (Expand All)
      </button>
      <button class="custom-btn" onclick="collapseAll()">
        Thu gọn tất cả (Collapse All)
      </button>
    </div>

    <div id="swagger-ui"></div>

    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
    <script>
      // Override prefers-color-scheme to force light mode by default
      if (window.matchMedia) {
        const originalMatchMedia = window.matchMedia;
        window.matchMedia = function (query) {
          if (query && query.includes("prefers-color-scheme: dark")) {
            return {
              matches: false,
              media: query,
              onchange: null,
              addListener: function () {},
              removeListener: function () {},
              addEventListener: function () {},
              removeEventListener: function () {},
            };
          }
          return originalMatchMedia(query);
        };
      }

      window.onload = function () {
        SwaggerUIBundle({
          urls: [
            { url: "/api-docs/swagger.json", name: "v1" }
          ],
          dom_id: "#swagger-ui",
          deepLinking: true,
          presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
          layout: "StandaloneLayout",
          docExpansion: "none",
        })
      }

      function expandAll() {
        document
          .querySelectorAll(".opblock-tag-section:not(.is-open) .opblock-tag")
          .forEach((btn) => btn.click())

        setTimeout(() => {
          document
            .querySelectorAll(
              '.opblock-summary-control:not([aria-expanded="true"])',
            )
            .forEach((btn) => btn.click())
        }, 100)
      }

      function collapseAll() {
        document
          .querySelectorAll('.opblock-summary-control[aria-expanded="true"]')
          .forEach((btn) => btn.click())

        setTimeout(() => {
          document
            .querySelectorAll(".opblock-tag-section.is-open .opblock-tag")
            .forEach((btn) => btn.click())
        }, 100)
      }
    </script>
  </body>
</html>

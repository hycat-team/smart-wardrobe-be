services:
    postgres:
        image: pgvector/pgvector:pg17
        container_name: postgres-smartwardrobe
        restart: always
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_NAME}
        ports:
            - "${DB_PORT}:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./init-db:/docker-entrypoint-initdb.d
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        container_name: redis-smartwardrobe
        restart: always
        command: redis-server --requirepass ${REDIS_PASSWORD}
        ports:
            - "${REDIS_PORT}:6379"
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

    backend:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: backend-smartwardrobe
        # restart: always
        ports:
            - "${SERVER_PORT}:8080"
        environment:
            - CONFIG_FILE=/app/config/config.production.yaml
        env_file:
            - .env
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy

    rabbitmq:
        image: rabbitmq:3-management-alpine
        container_name: rabbitmq-smartwardrobe
        restart: always
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
        ports:
            - "${RABBITMQ_PORT}:5672"
            - "15672:15672"
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
            interval: 10s
            timeout: 5s
            retries: 5

    elasticsearch:
        image: elasticsearch:8.12.0
        container_name: elasticsearch-smartwardrobe
        # restart: always
        environment:
            - discovery.type=single-node
            - xpack.security.enabled=false
            - ES_JAVA_OPTS=-Xms512m -Xmx512m
        mem_limit: 750m
        ports:
            - "9200:9200"
        volumes:
            - elasticsearch_data:/usr/share/elasticsearch/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'",
                ]
            interval: 10s
            timeout: 5s
            retries: 5

    ngrok:
        image: ngrok/ngrok:latest
        container_name: ngrok-smartwardrobe
        environment:
            NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
        command:
            - "http"
            - "${NGROK_TARGET}"
            - "--url=https://${NGROK_DOMAIN}"
        extra_hosts:
            - "host.docker.internal:host-gateway"

volumes:
    postgres_data:
    redis_data:
    rabbitmq_data:
    elasticsearch_data:

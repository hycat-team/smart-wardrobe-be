services:
    postgres:
        image: pgvector/pgvector:pg17
        container_name: postgres-smartwardrobe
        restart: always
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_NAME}
        ports:
            - "${DB_PORT}:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./init-db:/docker-entrypoint-initdb.d
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        container_name: redis-smartwardrobe
        restart: always
        command: redis-server --requirepass ${REDIS_PASSWORD}
        ports:
            - "${REDIS_PORT}:6379"
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

    backend:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: backend-smartwardrobe
        restart: always
        ports:
            - "${SERVER_PORT}:8080"
        environment:
            - DB_HOST=postgres
            - REDIS_HOST=redis
            - LOG_TO_FILE=false
        env_file:
            - .env
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy

    ngrok:
        image: ngrok/ngrok:latest
        container_name: ngrok-smartwardrobe
        restart: always
        environment:
            NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
        command:
            - "http"
            - "${NGROK_TARGET}"
            - "--url=https://${NGROK_DOMAIN}"
        extra_hosts:
            - "host.docker.internal:host-gateway"

volumes:
    postgres_data:
    redis_data:

info:
  contact: {}
  description: API docs for Smart Wardrobe.
  title: Smart Wardrobe API Document
  version: "1.0"
paths:
  /api/v1/admin/categories:
    get:
      description: Cho phép Admin lấy danh sách toàn bộ danh mục trang phục trong
        hệ thống để quản trị
      produces:
      - application/json
      responses:
        "200":
          description: Danh sách danh mục
          schema:
            allOf:
            - $ref: '#/definitions/smart-wardrobe-be_internal_shared_presentation.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/smart-wardrobe-be_internal_modules_wardrobe_application_dto.CategoryRes'
                  type: array
              type: object
      summary: Lấy danh sách danh mục trang phục (Admin)
      tags:
      - Admin
    post:
      consumes:
      - application/json
      description: Cho phép Admin tạo mới một danh mục trang phục trong hệ thống
      parameters:
      - description: Thông tin danh mục cần tạo
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/smart-wardrobe-be_internal_modules_wardrobe_application_dto.CreateCategoryReq'
      produces:
      - application/json
      responses:
        "201":
          description: Thông tin danh mục sau khi tạo
          schema:
            allOf:
            - $ref: '#/definitions/smart-wardrobe-be_internal_shared_presentation.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/smart-wardrobe-be_internal_modules_wardrobe_application_dto.CategoryRes'
              type: object
      summary: Tạo danh mục trang phục (Admin)
      tags:
      - Admin
  /api/v1/admin/categories/{id}:
    delete:
      description: Cho phép Admin xóa một danh mục trang phục nếu không còn trang
        phục người dùng liên kết
      parameters:
      - description: ID danh mục
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Xóa danh mục thành công
          schema:
            $ref: '#/definitions/smart-wardrobe-be_internal_shared_presentation.APIResponse'
      summary: Xóa danh mục trang phục (Admin)
      tags:
      - Admin
    get:
      description: Cho phép Admin lấy thông tin chi tiết của một danh mục trang phục
        theo ID
      parameters:
      - description: ID danh mục
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:

definitions:
  smart-wardrobe-be_internal_modules_identity_application_dto.ChangePasswordReq:
    properties:
      confirmPassword:
        type: string
      logoutAllDevices:
        type: boolean
      newPassword:
        minLength: 6
        type: string
      oldPassword:
        type: string
    required:
    - confirmPassword
    - newPassword
    - oldPassword
    type: object
  smart-wardrobe-be_internal_modules_identity_application_dto.ConfirmForgotPasswordOtpReq:
    properties:
      email:
        type: string
      otpCode:
        type: string
    required:
    - email
    - otpCode
    type: object
  smart-wardrobe-be_internal_modules_identity_application_dto.ConfirmRegisterOtpReq:
    properties:
      email:
        type: string
      otpCode:
        type: string
    required:
    - email
    - otpCode
    type: object
  smart-wardrobe-be_internal_modules_identity_application_dto.LoginReq:
    properties:
      loginName:
        type: string
      password:
        type: string
    required:
    - loginName
    - password
    type: object
  smart-wardrobe-be_internal_modules_identity_application_dto.RegisterReq:
    properties:
      address:
        type: string
      confirmPassword:
        type: string
      dateOfBirth:
        type: string
      email:
        type: string
      firstName:
        type: string
      gender:
        allOf:
        - $ref: '#/definitions/smart-wardrobe-be_internal_shared_domain_constants_gender.Gender'
        enum:
        - 0
        - 1
        - 2
        - 3
      lastName:
        type: string
      password:
        minLength: 6
        type: string
      username:
        type: string
    required:
    - address
    - confirmPassword
    - dateOfBirth
    - email
    - firstName
    - password
    - username
    type: object
  smart-wardrobe-be_internal_modules_identity_application_dto.ResetPasswordReq:
    properties:
      confirmPassword:
        type: string
      logoutAllDevices:
        type: boolean
      newPassword:
        minLength: 6
        type: string
    required:
    - confirmPassword
    - newPassword
    type: object
  smart-wardrobe-be_internal_modules_identity_application_dto.SendForgotPasswordOtpReq:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  smart-wardrobe-be_internal_modules_identity_application_dto.UpdateAvatarReq:
    properties:
      avatarPublicId:
        type: string
      avatarUrl:
        type: string
    required:
    - avatarPublicId
    - avatarUrl
    type: object
  smart-wardrobe-be_internal_modules_identity_application_dto.UpdateProfileReq:
    properties:
      address:
        type: string
      dateOfBirth:
        type: string
      firstName:
        type: string
      gender:
        allOf:
        - $ref: '#/definitions/smart-wardrobe-be_internal_shared_domain_constants_gender.Gender'
        enum:
        - 0
        - 1
        - 2
        - 3
      lastName:
        type: string
    required:
    - firstName
    type: object
  smart-wardrobe-be_internal_modules_identity_application_dto.UserBodyProfileRes:
    properties:
      bodyType:
        type: string
      estimatedBodyShape:
        type: string
      fitPreference:
        type: string
      height:
        type: number
      recommendedSize:
        type: string
      skinTone:
        type: string
      stylingNotes:
        type: string
      weight:
        type: number
    type: object
  smart-wardrobe-be_internal_modules_identity_application_dto.UserRes:
    properties:
      address:
        type: string
      avatarPublicId:
        type: string
      avatarUrl:
        type: string
      bodyProfile:
        allOf:
        - $ref: '#/definitions/smart-wardrobe-be_internal_modules_identity_application_dto.UserBodyProfileRes'
        description: Quota        *UserQuotaRes       `json:"quota,omitempty"`
      createdAt:
        type: string
      email:
        type: string
      firstName:
        type: string
      gender:
        $ref: '#/definitions/smart-wardrobe-be_internal_shared_domain_constants_gender.Gender'
      id:
        type: string
      lastName:
        type: string
      roleSlug:
        $ref: '#/definitions/smart-wardrobe-be_internal_shared_domain_constants_roleslug.RoleSlug'
      status:
        type: integer
      subscription:
        $ref: '#/definitions/smart-wardrobe-be_internal_modules_identity_application_dto.UserSubscriptionRes'
      username:
        type: string
    type: object
  smart-wardrobe-be_internal_modules_identity_application_dto.UserSubscriptionRes:
    properties:
      aiChatDailyQuota:
        type: integer
      aiOutfitDailyQuota:
        type: integer
      expiresAt:
        type: string
      maxOutfits:
        type: integer
      maxWardrobeItems:
        type: integer
      planId:
        type: string
      planName:
        type: string
      planSlug:
        type: string
    type: object
  smart-wardrobe-be_internal_modules_subscription_application_dto.DirectPurchaseReq:
    properties:
      cancelUrl:
        type: string
      planSlug:
        type: string
      returnUrl:
        type: string
    required:
    - planSlug
    type: object
  smart-wardrobe-be_internal_modules_subscription_application_dto.PayOSWebhookData:
    properties:
      accountNumber:
        type: string
      amount:
        type: integer
      code:
        type: string
      desc:
        type: string
      description:
        type: string
      orderCode:
        type: integer
      paymentLinkId:
        type: string
      reference:
        type: string
      transactionDateTime:
        type: string
    type: object
  smart-wardrobe-be_internal_modules_subscription_application_dto.PayOSWebhookReq:
    properties:
      code:
        type: string
      data:
        $ref: '#/definitions/smart-wardrobe-be_internal_modules_subscription_application_dto.PayOSWebhookData'
      desc:
        type: string
      signature:
        type: string
    type: object
  smart-wardrobe-be_internal_modules_subscription_application_dto.WalletTopUpReq:
    properties:
      amount:
        type: number
      cancelUrl:
        type: string
      returnUrl:
        type: string
    required:
    - amount
    type: object
  smart-wardrobe-be_internal_modules_subscription_presentation_dto.SetAutoRenewReq:
    properties:
      enabled:
        type: boolean
    required:
    - enabled
    type: object
  smart-wardrobe-be_internal_modules_wardrobe_application_dto.BatchCropWardrobeItemReq:
    properties:
      categoryId:
        type: string
      imagePublicId:
        type: string
      imageUrl:
        type: string
    required:
    - categoryId
    - imagePublicId
    - imageUrl
    type: object
  smart-wardrobe-be_internal_modules_wardrobe_application_dto.BatchCropWardrobeItemsReq:
    properties:
      items:
        items:
          $ref: '#/definitions/smart-wardrobe-be_internal_modules_wardrobe_application_dto.BatchCropWardrobeItemReq'
        minItems: 1
        type: array
    required:
    - items
    type: object
  smart-wardrobe-be_internal_modules_wardrobe_application_dto.CategoryRes:
    properties:
      id:
        type: string
      name:
        type: string
      slug:
        type: string
    type: object
  smart-wardrobe-be_internal_modules_wardrobe_application_dto.CloneWardrobeItemReq:
    properties:
      quantity:
        maximum: 5
        minimum: 1
        type: integer
    required:
    - quantity
    type: object
  smart-wardrobe-be_internal_modules_wardrobe_application_dto.InitClosetFromCatalogReq:
    properties:
      catalogItemIds:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - catalogItemIds
    type: object
  smart-wardrobe-be_internal_modules_wardrobe_application_dto.WardrobeItemRes:
    properties:
      category:
        $ref: '#/definitions/smart-wardrobe-be_internal_modules_wardrobe_application_dto.CategoryRes'
      color:
        type: string
      createdAt:
        type: string
      description:
        type: string
      fit:
        type: string
      id:
        type: string
      imagePublicId:
        type: string
      imageUrl:
        type: string
      isLocked:
        type: boolean
      material:
        type: string
      pattern:
        type: string
      seasonality:
        type: string
      status:
        $ref: '#/definitions/smart-wardrobe-be_internal_shared_domain_constants_wardrobestatus.WardrobeItemStatus'
      style:
        type: string
      userId:
        type: string
    type: object
  smart-wardrobe-be_internal_shared_application_dto.UploadSignatureResult:
    properties:
      apiKey:
        type: string
      folder:
        type: string
      publicId:
        type: string
      signature:
        type: string
      timestamp:
        type: integer
    type: object
  smart-wardrobe-be_internal_shared_domain_constants_gender.Gender:
    enum:
    - 0
    - 1
    - 2
    - 3
    type: integer
    x-enum-varnames:
    - Unknown
    - Male
    - Female
    - Other
  smart-wardrobe-be_internal_shared_domain_constants_roleslug.RoleSlug:
    enum:
    - admin
    - member
    type: string
    x-enum-varnames:
    - Admin
    - Member
  smart-wardrobe-be_internal_shared_domain_constants_wardrobestatus.WardrobeItemStatus:
    enum:
    - 0
    - 1
    - 2
    - 3
    - 4
    format: int32
    type: integer
    x-enum-comments:
      Failed: AI processing failed
      Processing: AI processing in background
    x-enum-descriptions:
    - ""
    - ""
    - ""
    - AI processing in background
    - AI processing failed
    x-enum-varnames:
    - InWardrobe
    - Selling
    - Sold
    - Processing
    - Failed
  smart-wardrobe-be_internal_shared_presentation.APIResponse:
    properties:
      data: {}
      message:
        type: string
    type: object
info:
  contact: {}
  description: API docs for Smart Wardrobe.
  title: Smart Wardrobe API Document
  version: "1.0"
paths:
  /api/v1/auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Gửi mã OTP xác thực khôi phục mật khẩu qua email
      parameters:
      - description: Email nhận OTP
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/smart-wardrobe-be_internal_modules_identity_application_dto.SendForgotPasswordOtpReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/smart-wardrobe-be_internal_shared_presentation.APIResponse'
      summary: Yêu cầu khôi phục mật khẩu
      tags:
      - Auth
  /api/v1/auth/forgot-password/confirm-otp:
    post:
      consumes:
      - application/json
      description: Xác thực mã OTP khôi phục mật khẩu và lưu token tạm thời vào cookie
      parameters:
      - description: Mã OTP và Email
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/smart-wardrobe-be_internal_modules_identity_application_dto.ConfirmForgotPasswordOtpReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/smart-wardrobe-be_internal_shared_presentation.APIResponse'
      summary: Xác thực OTP khôi phục mật khẩu
      tags:
      - Auth
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Đăng nhập hệ thống bằng username hoặc email và password
      parameters:
      - description: Thông tin đăng nhập
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/smart-wardrobe-be_internal_modules_identity_application_dto.LoginReq'
      produces:
      - application/json
      responses:
        "200":
          description: accessToken in data
          schema:
            allOf:
            - $ref: '#/definitions/smart-wardrobe-be_internal_shared_presentation.APIResponse'
            - properties:
                data:
                  additionalProperties:
                    type: string
                  type: object
              type: object
      summary: Đăng nhập
      tags:
      - Auth
  /api/v1/auth/logout:
    post:
      consumes:
      - application/json
      description: Đăng xuất người dùng, vô hiệu hóa token hiện tại và xóa cookie
        refresh token & access token
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/smart-wardrobe-be_internal_shared_presentation.APIResponse'
      summary: Đăng xuất
      tags:
      - Auth
  /api/v1/auth/refresh-token:
    post:
      consumes:
      - application/json
      description: Sử dụng refresh token trong cookie để lấy access token mới và xoay
        vòng refresh token
      produces:
      - application/json
      responses:
        "200":
          description: accessToken in data
          schema:
            allOf:
            - $ref: '#/definitions/smart-wardrobe-be_internal_shared_presentation.APIResponse'
            - properties:
                data:
                  additionalProperties:
                    type: string
                  type: object
              type: object
      summary: Xoay vòng token (Refresh Token)
      tags:
      - Auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Đăng ký tài khoản mới cho người dùng và gửi OTP xác thực qua email
      parameters:
      - description: Thông tin đăng ký
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/smart-wardrobe-be_internal_modules_identity_application_dto.RegisterReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/smart-wardrobe-be_internal_shared_presentation.APIResponse'
      summary: Đăng ký tài khoản
      tags:
      - Auth
  /api/v1/auth/register/confirm-otp:
    post:
      consumes:
      - application/json
      description: Xác nhận OTP gửi qua email để kích hoạt tài khoản
      parameters:
      - description: Mã OTP xác thực
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/smart-wardrobe-be_internal_modules_identity_application_dto.ConfirmRegisterOtpReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/smart-wardrobe-be_internal_shared_presentation.APIResponse'
      summary: Xác thực OTP đăng ký
      tags:
      - Auth
  /api/v1/auth/reset-password:
    post:
      consumes:
      - application/json
      description: Sử dụng token tạm thời từ cookie để tiến hành đặt mật khẩu mới
      parameters:
      - description: Mật khẩu mới và mật khẩu xác nhận
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/smart-wardrobe-be_internal_modules_identity_application_dto.ResetPasswordReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/smart-wardrobe-be_internal_shared_presentation.APIResponse'
      summary: Đặt lại mật khẩu
      tags:
      - Auth
  /api/v1/me:
    get:
      consumes:
      - application/json
      description: Lấy thông tin chi tiết tài khoản của người dùng hiện tại đang đăng
        nhập
      produces:
      - application/json
      responses:
        "200":
          description: Thông tin người dùng
          schema:
            allOf:
            - $ref: '#/definitions/smart-wardrobe-be_internal_shared_presentation.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/smart-wardrobe-be_internal_modules_identity_application_dto.UserRes'
              type: object
      summary: Lấy thông tin cá nhân
      tags:
      - Me
    put:
      consumes:
      - application/json
      description: Cập nhật các trường thông tin của người dùng hiện tại đang đăng
        nhập
      parameters:
      - description: Thông tin cập nhật
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/smart-wardrobe-be_internal_modules_identity_application_dto.UpdateProfileReq'
      produces:
      - application/json
      responses:
        "200":
          description: Thông tin người dùng sau khi cập nhật
          schema:
            allOf:
            - $ref: '#/definitions/smart-wardrobe-be_internal_shared_presentation.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/smart-wardrobe-be_internal_modules_identity_application_dto.UserRes'
              type: object
      summary: Cập nhật thông tin cá nhân
      tags:
      - Me
  /api/v1/me/avatar:
    put:
      consumes:
      - application/json
      description: Cập nhật URL ảnh đại diện và public ID của người dùng
      parameters:
      - description: Thông tin ảnh đại diện mới
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/smart-wardrobe-be_internal_modules_identity_application_dto.UpdateAvatarReq'
      produces:
      - application/json
      responses:
        "200":
          description: Thông tin người dùng sau khi cập nhật
          schema:
            allOf:
            - $ref: '#/definitions/smart-wardrobe-be_internal_shared_presentation.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/smart-wardrobe-be_internal_modules_identity_application_dto.UserRes'
              type: object
      summary: Cập nhật ảnh đại diện
      tags:
      - Me
  /api/v1/me/avatar-signature:
    get:
      description: Lấy chữ ký bảo mật từ Cloudinary để client tải trực tiếp ảnh đại
        diện lên
      produces:
      - application/json
      responses:
        "200":
          description: Chữ ký và thông tin upload
          schema:
            allOf:
            - $ref: '#/definitions/smart-wardrobe-be_internal_shared_presentation.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/smart-wardrobe-be_internal_shared_application_dto.UploadSignatureResult'
              type: object
      summary: Lấy chữ ký tải ảnh đại diện
      tags:
      - Me
  /api/v1/me/change-password:
    put:
      consumes:
      - application/json
      description: Thay đổi mật khẩu cho người dùng hiện tại đang đăng nhập
      parameters:
      - description: Mật khẩu cũ và mới
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/smart-wardrobe-be_internal_modules_identity_application_dto.ChangePasswordReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/smart-wardrobe-be_internal_shared_presentation.APIResponse'
      summary: Đổi mật khẩu
      tags:
      - Me
  /api/v1/me/wardrobe-items:
    get:
      description: Lấy toàn bộ danh sách trang phục của người dùng, phân tích và áp
        dụng trạng thái khóa động nếu hạ cấp gói
      produces:
      - application/json
      responses:
        "200":
          description: Danh sách trang phục
          schema:
            allOf:
            - $ref: '#/definitions/smart-wardrobe-be_internal_shared_presentation.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/smart-wardrobe-be_internal_modules_wardrobe_application_dto.WardrobeItemRes'
                  type: array
              type: object
      summary: Lấy danh sách trang phục
      tags:
      - Wardrobe
  /api/v1/subscriptions/me/daily-quota:
    get:
      consumes:
      - application/json
      description: Lấy hạn ngạch chi tiết và trạng thái sử dụng của người dùng trong
        ngày
      produces:
      - application/json
      responses:
        "200":
          description: Hạn ngạch sử dụng
          schema:
            $ref: '#/definitions/smart-wardrobe-be_internal_shared_presentation.APIResponse'
      summary: Lấy hạn ngạch sử dụng hàng ngày
      tags:
      - Subscription
  /api/v1/subscriptions/me/purchase:
    post:
      consumes:
      - application/json
      description: Khởi tạo link thanh toán VietQR qua cổng PayOS để đăng ký gói cước
        trực tiếp
      parameters:
      - description: Thông tin gói cước
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/smart-wardrobe-be_internal_modules_subscription_application_dto.DirectPurchaseReq'
      produces:
      - application/json
      responses:
        "200":
          description: Link thanh toán
          schema:
            $ref: '#/definitions/smart-wardrobe-be_internal_shared_presentation.APIResponse'
      summary: Đăng ký mua gói cước trực tiếp
      tags:
      - Billing
  /api/v1/subscriptions/me/purchase-with-wallet:
    post:
      consumes:
      - application/json
      description: Thực hiện mua gói cước bằng cách trừ số dư ví nội bộ của người
        dùng
      parameters:
      - description: Thông tin gói cước (chỉ cần planSlug)
        in: body
        name: body
        schema:
          $ref: '#/definitions/smart-wardrobe-be_internal_modules_subscription_application_dto.DirectPurchaseReq'
      produces:
      - application/json
      responses:
        "200":
          description: Kết quả đăng ký
          schema:
            $ref: '#/definitions/smart-wardrobe-be_internal_shared_presentation.APIResponse'
      summary: Đăng ký mua gói cước bằng ví nội bộ
      tags:
      - Billing
  /api/v1/subscriptions/me/toggle-auto-renew:
    patch:
      consumes:
      - application/json
      description: Thiết lập bật hoặc tắt tính năng tự động gia hạn gói cước qua ví
        nội bộ khi hết hạn
      parameters:
      - description: Trạng thái thiết lập tự động gia hạn
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/smart-wardrobe-be_internal_modules_subscription_presentation_dto.SetAutoRenewReq'
      produces:
      - application/json
      responses:
        "200":
          description: Trạng thái tự động gia hạn mới
          schema:
            $ref: '#/definitions/smart-wardrobe-be_internal_shared_presentation.APIResponse'
      summary: Thiết lập tự động gia hạn gói cước
      tags:
      - Subscription
  /api/v1/subscriptions/me/wallet:
    get:
      consumes:
      - application/json
      description: Lấy số dư hiện có trong ví nội bộ của người dùng
      produces:
      - application/json
      responses:
        "200":
          description: Số dư ví
          schema:
            $ref: '#/definitions/smart-wardrobe-be_internal_shared_presentation.APIResponse'
      summary: Lấy số dư ví người dùng
      tags:
      - Billing
  /api/v1/subscriptions/me/wallet/statements:
    get:
      consumes:

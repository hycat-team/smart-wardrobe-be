            - $ref: '#/definitions/smart-wardrobe-be_internal_shared_presentation.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/smart-wardrobe-be_internal_modules_wardrobe_application_dto.CategoryRes'
              type: object
      summary: Lấy chi tiết danh mục trang phục (Admin)
      tags:
      - Admin
    put:
      consumes:
      - application/json
      description: Cho phép Admin cập nhật thông tin của một danh mục trang phục theo
        ID
      parameters:
      - description: ID danh mục
        in: path
        name: id
        required: true
        type: string
      - description: Thông tin danh mục cần cập nhật
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/smart-wardrobe-be_internal_modules_wardrobe_application_dto.UpdateCategoryReq'
      produces:
      - application/json
      responses:
        "200":
          description: Thông tin danh mục sau khi cập nhật
          schema:
            allOf:
            - $ref: '#/definitions/smart-wardrobe-be_internal_shared_presentation.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/smart-wardrobe-be_internal_modules_wardrobe_application_dto.CategoryRes'
              type: object
      summary: Cập nhật danh mục trang phục (Admin)
      tags:
      - Admin

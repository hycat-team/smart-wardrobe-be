database:
    host: postgres
    port: 5432
    ssl_mode: disable
    time_zone: Asia/Ho_Chi_Minh
redis:
    host: redis
    port: 6379
    db: 0
server:
    port: "8080"
    front_end_origin: https://closy.hycat.online
    timeout_seconds: 300
    env: production
startup:
    retry_attempt_1_seconds: 5
    retry_attempt_2_seconds: 15
    retry_attempt_3_seconds: 30
jwt:
    issuer: SmartWardrobeServer
    audience: SmartWardrobeClient
    access_expiration_minutes: 60
    refresh_expiration_days: 30
    forgot_password_expiration_minutes: 15
logger:
    log_level: info
    file_path: ./logs/app.log
    log_to_file: false
quota:
    default_wardrobe_limit: 100
    default_ai_outfit_limit: 3
    default_ai_chat_limit: 3
otp:
    max_attempts: 3
    expiry_minutes: 5
    resend_interval_seconds: 60
email:
    host: smtp.gmail.com
    port: 587
    sender_name: Closy Support
rate_limit:
    token_limit: 100
    tokens_per_period: 20
    replenishment_seconds: 10
payos:
    return_url: https://closy.hycat.online
    cancel_url: https://closy.hycat.online
    expired_minutes: 15
    reconciliation_cron: "0 */10 * * * *"
    reconciliation_batch_size: 50
    reconciliation_lease_seconds: 45
    reconciliation_max_attempts: 20
    reconciliation_max_age_hours: 168
cloudinary:
    avatar_folder: closy/avatars
    item_folder: closy/items
    outfit_folder: closy/outfits
    post_folder: closy/posts
ai:
    chat_text_timeout_seconds: 30
    recommendation_text_timeout_seconds: 45
    vision_timeout_seconds: 20
    embedding_timeout_seconds: 20
    chat_text_rpm_limit: 15
    recommendation_text_rpm_limit: 5
    vision_rpm_limit: 28
    embedding_rpm_limit: 50
    chat_max_input_characters: 2000
    chat_history_message_max_characters: 500
    chat_max_output_tokens: 500
    summary_source_max_characters: 3000
    summary_previous_max_characters: 800
    summary_max_output_tokens: 400
    rewriter_prompt_max_characters: 1000
    rewriter_max_output_tokens: 250
    recommendation_details_max_characters: 1000
    recommendation_prompt_candidate_limit: 24
    recommendation_description_max_characters: 180
    recommendation_tags_limit: 8
    recommendation_prompt_max_characters: 18000
    recommendation_max_output_tokens: 600
    free_text_timeout_seconds: 30
    free_text_rpm_limit: 15
    usage_reconcile_cron: "0 */10 * * * *"
    usage_reconcile_batch_size: 100
    pricing:
        version: gemini-2.5-flash-lite-2026-06
        currency: VND
        usd_to_vnd: "27000"
        paid:
            input_usd_per_million_tokens: "0.10"
            output_usd_per_million_tokens: "0.40"
rabbitmq:
    host: rabbitmq
    port: 5672
elasticsearch:
    addresses: [http://elasticsearch:9200]
community:
    max_personalized_window: 100
rag:
    recently_worn_penalty_days: 3
    long_unworn_bonus_days: 14
    rrf_k_parameter: 30
    recommendation_candidate_limit: 40
    recommendation_minimum_candidate_pool: 20
    recommendation_embedding_dimension: 768
    recommendation_embedding_timeout_seconds: 2
    recommendation_llm_rewriter_enabled: false
    recommendation_llm_rewriter_timeout_seconds: 2
    recommendation_rewriter_max_semantic_length: 512
    recommendation_rewriter_max_lexical_terms: 24
    recommendation_rewriter_max_excluded_terms: 24
wardrobe:
    retry_delay_1_seconds: 60
    retry_delay_2_seconds: 300
    retry_delay_3_seconds: 900
    stale_minutes: 20
    max_retry_count: 3
    recovery_scan_cron: "0 */5 * * * *"
    category_cache_ttl_seconds: 300
